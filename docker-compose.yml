version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: vectorlens
      POSTGRES_PASSWORD: vectorlens123
      POSTGRES_DB: vectorlens
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    
  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  chroma:
    image: chromadb/chroma
    ports:
      - "8080:8000"
    volumes:
    - chroma_data:/chroma/chroma
    
  redis:
    image: redis:7
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
  minio:
    image: minio/minio
    ports:
      - "9000:9000"
      - "9001:9001"
    environment:
      MINIO_ROOT_USER: vectorlens
      MINIO_ROOT_PASSWORD: vectorlens123
    command: server /data --console-address ":9001"
    volumes:
      - minio_data:/data

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
    ports:
      - "2181:2181"

  kafka:
    image: confluentinc/cp-kafka:7.4.0
    depends_on:
      - zookeeper
    ports:
      - "9092:9092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://localhost:9092
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1

      
volumes:
  postgres_data:
  qdrant_data:
  chroma_data:
  redis_data:
  minio_data: