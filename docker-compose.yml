version: '3.8'

services:
  postgres:
    image: postgres:15
    environment:
      POSTGRES_USER: vectorlens
      POSTGRES_PASSWORD: vectorlens123
      POSTGRES_DB: vectorlens
    ports:
      - "5435:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    
  qdrant:
    image: qdrant/qdrant
    ports:
      - "6333:6333"
    volumes:
      - qdrant_data:/qdrant/storage

  chroma:
    image: chromadb/chroma
    ports:
      - "8080:8000"
    volumes:
    - chroma_data:/chroma/chroma
    
volumes:
  postgres_data:
  qdrant_data:
  chroma_data: